<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewAI – Pro Agency Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        :root {
            --bg-deep: #0D1117;
            --bg-surface: #161B22;
            --bg-card: #0D1117;
            --border: #30363D;
            --text-main: #C9D1D9;
            --text-dim: #8B949E;
            --accent-yellow: #EAB308;
            --accent-red: #F85149;
            --accent-green: #238636;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg-deep); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            overflow: hidden;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #30363D; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #484F58; }

        .btn {
            cursor: pointer; border: 1px solid var(--border); outline: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: 600;
            background: var(--bg-surface); color: var(--text-main);
        }
        .btn:hover { border-color: #8B949E; background: #21262D; }
        .btn-primary { background: #238636; border: none; color: #FFF; }
        .btn-primary:hover { background: #2EA043; transform: translateY(-1px); }
        .btn-rejected { background: var(--accent-red); color: #FFF; border: none; }

        .status-banner {
            background: rgba(234, 179, 8, 0.1);
            border: 1px solid rgba(234, 179, 8, 0.2);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent-yellow);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        .animate-slide { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

const SAMPLE_CODE = {
  JavaScript: `function calculateSum(arr) {\n  let total = 0\n  for (let i = 0; i <= arr.length; i++) {\n    total += arr[i]\n  }\n  return total\n}`,
  Python: `def is_palindrome(s):\n    for i in range(len(s) / 2):\n        if s[i] != s[len(s) - i]:\n            return False\n    return True`,
  "C++": `int findMax(int arr[], int n) {\n    int maxVal = 0;\n    for (int i = 0; i < n; i++) {\n        if (arr[i] > maxVal) maxVal = arr[i];\n    }\n    return maxVal;\n}`
};

// ─── Components ──────────────────────────────────────────────────────────────

function ScoreSection({ review }) {
  if (!review) return null;
  const score = review.score;
  const isRejected = review.verdict.includes("REJECTED");
  const color = isRejected ? "#F85149" : "#238636";
  const ringColor = score >= 70 ? "#238636" : score >= 40 ? "#EAB308" : "#F85149";

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", marginBottom: "32px", position: "relative" }}>
        <div className="status-banner">
            <span>⚡</span> Rule-based engine (API unavailable)
        </div>
        
        <div style={{ display: "flex", alignItems: "center", gap: "24px" }}>
            <div style={{ position: "relative", width: "100px", height: "100px" }}>
                <svg width="100" height="100" style={{ transform: "rotate(-90deg)" }}>
                    <circle cx="50" cy="50" r="44" fill="none" stroke="#21262D" strokeWidth="6" />
                    <circle cx="50" cy="50" r="44" fill="none" stroke={ringColor} strokeWidth="6" strokeDasharray="276.46" strokeDashoffset={276.46 * (1 - score/100)} strokeLinecap="round" style={{ transition: "stroke-dashoffset 1s ease" }} />
                </svg>
                <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", fontSize: "32px", fontWeight: "800", color: "#FFF" }}>{score}</div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: "4px" }}>
                <div style={{ fontSize: "12px", fontWeight: "600", color: "var(--text-dim)", letterSpacing: "1px" }}>CODE SCORE</div>
                <div style={{ background: isRejected ? "#F85149" : "#238636", color: "#FFF", padding: "4px 16px", borderRadius: "20px", fontSize: "12px", fontWeight: "800", textAlign: "center" }}>{review.verdict}</div>
            </div>
        </div>
    </div>
  );
}

function RewardCard({ breakdown }) {
  if (!breakdown) return null;
  return (
    <div style={{ background: "rgba(13, 17, 23, 0.5)", border: "1px solid #30363D", borderRadius: "12px", padding: "16px", marginBottom: "24px" }}>
        <div style={{ fontSize: "11px", fontWeight: "800", color: "#8B949E", marginBottom: "16px", letterSpacing: "0.5px" }}>REINFORCEMENT REWARD</div>
        <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: "13px", color: "#C9D1D9" }}>✅ Correct finding (+1)</div>
                <div style={{ color: "#238636", fontWeight: "700" }}>{breakdown.correct}</div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: "13px", color: "#C9D1D9" }}>● Partial finding (+0.5)</div>
                <div style={{ color: "#EAB308", fontWeight: "700" }}>{breakdown.partial}</div>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: "13px", color: "#C9D1D9" }}>❌ Wrong finding (-0.2)</div>
                <div style={{ color: "#F85149", fontWeight: "700" }}>{breakdown.wrong}</div>
            </div>
            <div style={{ height: "1px", background: "#30363D", margin: "4px 0" }}></div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: "14px", fontWeight: "700" }}>Total Step Reward</div>
                <div style={{ color: breakdown.total >= 0 ? "#238636" : "#F85149", fontWeight: "800", fontSize: "15px" }}>
                    {breakdown.total >= 0 ? "+" : ""}{breakdown.total.toFixed(2)} pts
                </div>
            </div>
        </div>
    </div>
  );
}

function BugCard({ bug }) {
  const isCritical = bug.severity === "critical";
  return (
    <div style={{ padding: "12px", borderRadius: "8px", background: "#0D1117", border: `1px solid ${isCritical ? '#F85149' : '#30363D'}`, marginBottom: "12px", borderLeft: `4px solid ${isCritical ? '#F85149' : '#EAB308'}` }}>
        <div style={{ display: "flex", gap: "8px", alignItems: "center", marginBottom: "6px" }}>
            <span style={{ fontSize: "10px", fontWeight: "800", background: isCritical ? "#F85149" : "#EAB308", color: "#FFF", padding: "1px 6px", borderRadius: "4px", textTransform: "uppercase" }}>{bug.severity}</span>
            <span style={{ fontSize: "11px", color: "#8B949E" }}>Line {bug.line} • {bug.type}</span>
        </div>
        <div style={{ fontSize: "13px", fontWeight: "500", color: "#C9D1D9", marginBottom: "4px" }}>{bug.description}</div>
        <div style={{ fontSize: "11px", color: "#8B949E", background: "#161B22", padding: "6px", borderRadius: "4px", marginTop: "8px" }}>{bug.fix}</div>
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────

function App() {
  const [code, setCode] = useState(SAMPLE_CODE["JavaScript"]);
  const [language, setLanguage] = useState("JavaScript");
  const [loading, setLoading] = useState(false);
  const [review, setReview] = useState(null);
  const [prevReview, setPrevReview] = useState(null);
  const [rewardBreakdown, setRewardBreakdown] = useState(null);
  const [activeTab, setActiveTab] = useState("bugs");

  const runReview = useCallback(async () => {
    setLoading(true);
    try {
      const apiUrl = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' ? "http://localhost:4000/api/review" : "/api/review";
      const resp = await fetch(apiUrl, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code, language, difficulty: "medium" })
      });
      const data = await resp.json();
      
      // Calculate reward breakdown
      const critCount = data.bugs.filter(b => b.severity === "critical").length;
      const warnCount = data.bugs.filter(b => b.severity === "warning" || b.severity === "info").length;
      
      let correct = 0, partial = 0, wrong = 0;
      
      if (prevReview) {
        const prevCrit = prevReview.bugs.filter(b => b.severity === "critical").length;
        const prevWarn = prevReview.bugs.filter(b => b.severity === "warning" || b.severity === "info").length;
        
        correct = Math.max(0, prevCrit - critCount);
        partial = Math.max(0, prevWarn - warnCount);
        
        const added = data.bugs.filter(b => !prevReview.bugs.some(pb => pb.line === b.line && pb.description === b.description)).length;
        if (added > 0 || data.score <= prevReview.score) {
            wrong = added || (data.score === prevReview.score ? 1 : 0);
        }
      } else {
        // Initial state: any bug found is current state, no "step" reward yet
        wrong = 0;
      }

      setRewardBreakdown({
        correct, partial, wrong,
        total: (correct * 1.0) + (partial * 0.5) - (wrong * 0.2)
      });
      
      setPrevReview(data);
      setReview(data);
    } catch (err) {
      console.error(err);
    } finally { setLoading(false); }
  }, [code, language, prevReview]);

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100vh" }}>
      <header style={{ height: "64px", borderBottom: "1px solid var(--border)", display: "flex", alignItems: "center", padding: "0 24px", justifyContent: "space-between" }}>
        <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
            <div style={{ width: "32px", height: "32px", background: "#FFF", color: "#000", borderRadius: "8px", fontWeight: "900", display: "flex", alignItems: "center", justifyContent: "center" }}>R</div>
            <div style={{ fontWeight: "700", letterSpacing: "-0.5px" }}>ReviewAI Agency</div>
        </div>
        <div style={{ display: "flex", gap: "12px" }}>
            <select style={{ background: "#21262D", color: "#FFF", border: "1px solid #30363D", borderRadius: "6px", padding: "4px 8px", fontSize: "12px" }} value={language} onChange={e => setLanguage(e.target.value)}>
                {Object.keys(SAMPLE_CODE).map(l => <option key={l} value={l}>{l}</option>)}
            </select>
            <button className={`btn ${review?.verdict === "REJECTED" ? "btn-rejected" : "btn-primary"}`} onClick={runReview} disabled={loading}>
                {loading ? "Analyzing..." : "Launch Review"}
            </button>
        </div>
      </header>

      <main style={{ flex: 1, display: "flex", overflow: "hidden" }}>
        <div style={{ flex: 1, overflow: "hidden", background: "#0D1117" }}>
            <textarea 
                value={code} 
                onChange={e => setCode(e.target.value)} 
                spellCheck={false}
                style={{ width: "100%", height: "100%", background: "transparent", border: "none", outline: "none", padding: "24px", fontFamily: "'JetBrains Mono', monospace", color: "#C9D1D9", fontSize: "14px", lineHeight: "1.6", resize: "none" }}
            />
        </div>

        <div style={{ width: "400px", borderLeft: "1px solid var(--border)", display: "flex", flexDirection: "column", background: "#161B22", overflowY: "auto" }}>
            <div style={{ padding: "24px" }}>
                {review ? (
                    <div className="animate-slide">
                        <ScoreSection review={review} />
                        <RewardCard breakdown={rewardBreakdown} />
                        
                        <div style={{ background: "#0D1117", border: "1px solid #30363D", borderRadius: "8px", padding: "12px", marginBottom: "16px", textAlign: "center", fontSize: "12px", color: "#8B949E" }}>
                            Found {review.bugs.length} issue(s): {review.bugs.filter(b => b.severity === 'critical').length} critical, {review.bugs.filter(b => b.severity === 'warning').length} warnings.
                        </div>

                        <div style={{ display: "flex", gap: "8px", marginBottom: "16px" }}>
                            <div style={{ flex: 1, background: "#0D1117", border: "1px solid #30363D", borderRadius: "8px", padding: "10px", textAlign: "center" }}>
                                <div style={{ fontSize: "16px", fontWeight: "700", color: "#F85149" }}>{review.bugs.length}</div>
                                <div style={{ fontSize: "9px", color: "#8B949E", textTransform: "uppercase" }}>Bugs</div>
                            </div>
                            <div style={{ flex: 1, background: "#0D1117", border: "1px solid #30363D", borderRadius: "8px", padding: "10px", textAlign: "center" }}>
                                <div style={{ fontSize: "16px", fontWeight: "700", color: "#C9D1D9" }}>0</div>
                                <div style={{ fontSize: "9px", color: "#8B949E", textTransform: "uppercase" }}>Opts</div>
                            </div>
                            <div style={{ flex: 1, background: "#0D1117", border: "1px solid #30363D", borderRadius: "8px", padding: "10px", textAlign: "center" }}>
                                <div style={{ fontSize: "16px", fontWeight: "700", color: "#F85149" }}>{review.bugs.filter(b => b.severity === 'critical').length}</div>
                                <div style={{ fontSize: "9px", color: "#8B949E", textTransform: "uppercase" }}>Critical</div>
                            </div>
                        </div>

                        <div style={{ display: "flex", gap: "2px", background: "#21262D", padding: "3px", borderRadius: "8px", marginBottom: "16px" }}>
                            {["bugs", "optimizations", "patch"].map(t => (
                                <button key={t} onClick={() => setActiveTab(t)} style={{ flex: 1, padding: "6px", border: "none", borderRadius: "6px", fontSize: "10px", fontWeight: "700", color: activeTab === t ? "#FFF" : "#8B949E", background: activeTab === t ? "#30363D" : "transparent", cursor: "pointer", textTransform: "uppercase" }}>{t}</button>
                            ))}
                        </div>

                        <div>
                            {activeTab === "bugs" && (review.bugs.map((b, i) => <BugCard key={i} bug={b} />))}
                            {activeTab === "patch" && <pre style={{ background: "#0D1117", color: "#3FB950", padding: "12px", borderRadius: "8px", fontSize: "12px", overflowX: "auto" }}>{review.codePatch}</pre>}
                        </div>
                    </div>
                ) : (
                    <div style={{ height: "60vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "#8B949E" }}>
                        <div style={{ fontSize: "40px", marginBottom: "16px" }}>📡</div>
                        <div style={{ fontSize: "14px", fontWeight: "600" }}>Awaiting Agency Context</div>
                        <div style={{ fontSize: "11px", marginTop: "4px" }}>Select a language and launch audit.</div>
                    </div>
                )}
            </div>
        </div>
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
    </script>
</body>
</html>
